<!doctype html>
<html lang="zh-CN">
<head>

  <style>
    :root {
      --ink: #172033;
      --muted: #64748b;
      --line: #d8e0ea;
      --panel: #ffffff;
      --bg: #f5f7fb;
      --blue: #2563eb;
      --green: #059669;
      --orange: #ea580c;
      --red: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      grid-template-areas: "sidebar map";
      height: 100dvh;
      min-height: 720px;
      overflow: hidden;
    }
    #map {
      grid-area: map;
      position: relative;
      width: 100%;
      height: 100%;
    }
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 12px 0 30px rgba(15, 23, 42, .08);
      z-index: 5;
      min-height: 0;
      height: 100%;
    }
    .header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 5px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .metric {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }
    .metric b { display: block; font-size: 17px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; margin-top: 1px; }
    .config {
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: #fff8ed;
    }
    .config.ok { background: #f0fdf4; }
    .config p { margin: 0 0 10px; color: #854d0e; font-size: 13px; line-height: 1.45; }
    .config.ok p { color: #166534; }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .config-grid.hidden { display: none; }
    input {
      width: 100%;
      height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 0 11px;
      font: inherit;
      background: white;
    }
    button {
      height: 38px;
      border: 0;
      border-radius: 9px;
      padding: 0 14px;
      background: var(--blue);
      color: white;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .toolbar-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .status {
      min-height: 26px;
      padding: 8px 22px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .days {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px 16px 22px;
    }
    .day-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      background: white;
      cursor: pointer;
    }
    .day-card.active {
      border-color: var(--blue);
      box-shadow: 0 10px 24px rgba(37, 99, 235, .12);
    }
    .day-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px 13px;
      cursor: pointer;
      background: #f8fafc;
    }
    .badge {
      width: 48px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 850;
      font-size: 14px;
    }
    .day-title b { display: block; font-size: 15px; }
    .day-title span { display: block; color: var(--muted); font-size: 12px; margin-top: 1px; }
    .day-distance {
      color: #0f172a;
      font-size: 12px;
      font-weight: 750;
      text-align: right;
      white-space: nowrap;
    }
    .day-body { padding: 11px 13px 13px; }
    .stops {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .stops li {
      display: grid;
      grid-template-columns: 27px 1fr;
      gap: 7px;
      align-items: start;
      padding: 5px 0;
      font-size: 13px;
      line-height: 1.35;
    }
    .stop-no {
      width: 23px;
      height: 23px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 800;
      margin-top: -1px;
    }
    .note {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      line-height: 1.45;
    }
    .map-marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 850;
      border: 2px solid white;
      box-shadow: 0 3px 10px rgba(15, 23, 42, .35);
    }
    .map-label {
      margin-top: 3px;
      padding: 2px 7px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(15, 23, 42, .12);
      border-radius: 7px;
      color: #0f172a;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(15, 23, 42, .12);
    }
    .marker-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-18px);
    }
    .fallback {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: min(520px, calc(100vw - 500px));
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(203, 213, 225, .9);
      box-shadow: 0 18px 35px rgba(15, 23, 42, .16);
      color: #334155;
      line-height: 1.5;
      z-index: 6;
      display: none;
    }
    .fallback b { color: #0f172a; }
    @media (max-width: 940px) {

        grid-template-areas:

          "map";
        height: 100dvh;
        min-height: 0;

      #map { min-height: 320px; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
        min-height: 0;
      }
      .header { padding: 16px 16px 12px; }
      h1 { font-size: 23px; }
      .config { padding: 12px 16px; }
      .status { padding: 8px 16px; }
      .days {
        flex: 1;
        min-height: 0;
        display: flex;
        gap: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 12px 12px 18px;
        scroll-padding: 12px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .days::after {
        content: "";
        flex: 0 0 1px;
      }
      .day-card {
        display: flex;
        flex: 0 0 min(86vw, 390px);
        flex-direction: column;
        height: min(32svh, 260px);
        max-height: 260px;
        margin-bottom: 0;
        scroll-snap-align: start;
      }
      .day-card.active {
        box-shadow: 0 8px 22px rgba(37, 99, 235, .16);
      }
      .toolbar-actions { grid-template-columns: 1fr; }
      .day-head { grid-template-columns: auto 1fr; }
      .day-distance { grid-column: 2; text-align: left; }
      .day-body {
        min-height: 0;
        overflow-y: auto;
      }
      .fallback { width: calc(100vw - 32px); left: 16px; bottom: 16px; }

</head>

          { name: '临夏八坊十三巷美仑酒店', address: '甘肃省临夏回族自治州临夏市临夏八坊十三巷美仑酒店', city: '临夏', coord: [103.2120, 35.6040] }
        ]
      },
      {
        day: 'D9',
        date: '7/26',
        title: '临夏返兰州中川机场',
        note: '从临夏八坊十三巷美仑酒店出发；航班 MU2446 17:55-20:40；建议 13:00 前离开黄洮交汇，15:00 左右到机场还车。',
        stops: [
          { name: '临夏八坊十三巷美仑酒店', address: '甘肃省临夏回族自治州临夏市临夏八坊十三巷美仑酒店', city: '临夏', coord: [103.2120, 35.6040] },
          { name: '黄洮交汇观景平台', address: '甘肃省临夏回族自治州永靖县黄洮交汇观景平台', city: '临夏', coord: [103.2860, 35.9180] },
          { name: '兰州中川国际机场 T3 航站楼', address: '兰州中川国际机场T3航站楼', city: '兰州', coord: [103.6208, 36.5152] }
        ]
      }
    ];

    let AMapRef = null;
    let map = null;
    let routeOverlays = [];
    let markers = [];
    let resolvedDays = [];
    let activeDay = null;
    const ROUTE_CACHE_KEY = 'gannanRoadbookRouteCache:v5';
    const DEFAULT_AMAP_KEY = window.GANNAN_AMAP_CONFIG?.key || '';
    const DEFAULT_AMAP_SECURITY = window.GANNAN_AMAP_CONFIG?.securityJsCode || '';

    const statusEl = document.getElementById('status');
    const daysEl = document.getElementById('days');
    const fallbackEl = document.getElementById('fallback');
    const configPanel = document.getElementById('configPanel');
    const configText = document.getElementById('configText');
    const keyInput = document.getElementById('amapKey');
    const securityInput = document.getElementById('amapSecurity');
    const configGrid = document.querySelector('.config-grid');

    keyInput.value = localStorage.getItem('gannanAmapKey') || DEFAULT_AMAP_KEY;
    securityInput.value = localStorage.getItem('gannanAmapSecurity') || DEFAULT_AMAP_SECURITY;

    renderDayCards();
    updateConfigVisibility();
    showFallback(true);

    document.getElementById('loadBtn').addEventListener('click', () => {
      const key = keyInput.value.trim();
      const security = securityInput.value.trim();
      if (!key || !security) {
        revealConfigInputs();
        setStatus('手机或线上页面缺少本机高德配置，请在上方填入 Key 和安全密钥后加载。');
        return;
      }
      localStorage.setItem('gannanAmapKey', key);
      localStorage.setItem('gannanAmapSecurity', security);
      updateConfigVisibility();
      loadRoadbook(key, security);
    });

    document.getElementById('fullRouteBtn').addEventListener('click', () => {
      activateFullRoute();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      localStorage.removeItem('gannanAmapKey');
      localStorage.removeItem('gannanAmapSecurity');
      keyInput.value = '';
      securityInput.value = '';
      updateConfigVisibility();
      setStatus('已清除浏览器本机配置。需要重新填入 Key 和安全密钥后加载。');
      showFallback(true);
    });

    if (keyInput.value && securityInput.value) {
      loadRoadbook(keyInput.value, securityInput.value);
    } else {
      revealConfigInputs();
      setStatus('线上页面未提交真实 Key。请在本机配置区填入高德 Key 和安全密钥，浏览器会保存在本机。');
    }

    async function loadRoadbook(key, securityJsCode) {
      showFallback(false);
      setStatus('正在加载高德 JSAPI...');
      if (map) {
        map.destroy();
        map = null;
        routeOverlays = [];
        markers = [];
        resolvedDays = [];
        activeDay = null;
      }
      window._AMapSecurityConfig = { securityJsCode };
      try {
        AMapLoader.load({
          key,
          version: '2.0',
          plugins: ['AMap.Scale', 'AMap.ToolBar', 'AMap.ControlBar', 'AMap.Driving']
        }).then(async (AMap) => {
          AMap.getConfig().appname = 'amap-jsapi-skill';
          AMapRef = AMap;
          map = new AMap.Map('map', {
            viewMode: '3D',
            zoom: 7,
            pitch: 28,
            rotation: -8,
            center: [102.65, 34.55],
            mapStyle: 'amap://styles/normal'
          });
          map.addControl(new AMap.Scale());
          map.addControl(new AMap.ToolBar({ position: { right: '16px', top: '20px' } }));
          map.addControl(new AMap.ControlBar({ position: { right: '16px', top: '88px' } }));
          configPanel.classList.add('ok');
          configText.textContent = '高德 JSAPI 已加载。已使用固定坐标快速生成路书，驾车路线会在后台补全。';
          resolvedDays = resolveAllStops();
          drawMarkers();
          drawPreviewRoutes();
          activateDay('D1');
          if (applyCachedRoutes()) {
            activateDay(activeDay || 'D1');
            setStatus('已使用本机缓存的驾车路线。点击每日卡片可聚焦当天路线。');
          } else {
            setStatus('已先显示固定坐标预览路线，正在后台规划真实驾车路线...');
            planAllRoutes();
          }
        }).catch((error) => {
          console.error(error);
          showFallback(true);
          setStatus('高德 JSAPI 加载失败，请检查 Key / securityJsCode / 域名白名单。');
        });
      } catch (error) {
        console.error(error);
        showFallback(true);
        setStatus('加载失败：' + error.message);
      }
    }

    function resolveAllStops() {
      return roadbook.map((day, dayIndex) => {
        const stops = day.stops.map((stop, i) => ({
          ...stop,
          point: stop.coord,
          globalIndex: globalStopIndex(dayIndex, i)
        }));
        return { ...day, color: COLORS[dayIndex], stops, routePaths: [], distance: 0, time: 0, errors: [], planned: false };
      });
    }

    async function planAllRoutes() {
      for (const day of resolvedDays) {
        day.routePaths = [];
        day.distance = 0;
        day.time = 0;
        day.errors = [];
        for (let i = 0; i < day.stops.length - 1; i += 1) {
          const start = day.stops[i].point;
          const end = day.stops[i + 1].point;
          setStatus(`后台规划 ${day.day}：${day.stops[i].name} → ${day.stops[i + 1].name}`);
          const result = await planSegment(start, end);
          if (result.ok) {
            day.routePaths.push(result.path);
            day.distance += result.distance;
            day.time += result.time;
          } else {
            day.errors.push(`${day.stops[i].name} → ${day.stops[i + 1].name}`);
            day.routePaths.push([start, end]);
          }
        }
        day.planned = true;
        removeDayRoutes(day.day);
        drawDayRoute(day);
        updateDayMetric(day);
        if (activeDay) activateDay(activeDay);
      }
      updateTotalMetrics();
      const hasErrors = resolvedDays.some((day) => day.errors.length);
      if (!hasErrors) saveRouteCache();
      if (routeOverlays.length || markers.length) {
        map.setFitView([...routeOverlays, ...markers], false, mapPadding());
      }
      setStatus(hasErrors ? '真实驾车路线已规划完成，部分路段规划失败，已保留预览线作为兜底。' : '真实驾车路线已规划完成并缓存。下次打开会优先使用缓存。');
    }

    function planSegment(start, end) {
      return new Promise((resolve) => {
        const driving = new AMapRef.Driving({
          policy: AMapRef.DrivingPolicy.LEAST_TIME,
          showTraffic: true
        });
        driving.search(start, end, (status, result) => {
          if (status === 'complete' && result.routes && result.routes.length) {
            const route = result.routes[0];
            const path = [];
            route.steps.forEach((step) => {
              if (step.path) path.push(...step.path.map((p) => [p.lng, p.lat]));
            });
            resolve({ ok: true, path, distance: route.distance || 0, time: route.time || 0 });
          } else {
            resolve({ ok: false, path: [start, end], distance: 0, time: 0 });
          }
        });
      });
    }

    function drawDayRoute(day) {
      day.routePaths.forEach((path) => {
        const line = new AMapRef.Polyline({
          path,
          isOutline: true,
          outlineColor: '#ffffff',
          borderWeight: 4,
          strokeColor: day.color,
          strokeOpacity: 0.92,
          strokeWeight: 7,
          lineJoin: 'round',
          lineCap: 'round',
          zIndex: 60,
          showDir: true
        });
        line.setExtData({ day: day.day, preview: !day.planned });
        map.add(line);
        routeOverlays.push(line);
      });
    }

    function drawPreviewRoutes() {
      resolvedDays.forEach((day) => {
        day.routePaths = [];
        for (let i = 0; i < day.stops.length - 1; i += 1) {
          day.routePaths.push([day.stops[i].point, day.stops[i + 1].point]);
        }
        drawDayRoute(day);
        updateDayMetric(day);
      });
      updateTotalMetrics();
      if (routeOverlays.length || markers.length) {
        map.setFitView([...routeOverlays, ...markers], false, mapPadding());
      }
    }

    function removeDayRoutes(dayName) {
      const keep = [];
      routeOverlays.forEach((line) => {
        if (line.getExtData().day === dayName) {
          map.remove(line);
        } else {
          keep.push(line);
        }
      });
      routeOverlays = keep;
    }

    function clearRouteOverlays() {
      if (routeOverlays.length) map.remove(routeOverlays);
      routeOverlays = [];
    }

    function routeSignature() {
      return JSON.stringify(roadbook.map((day) => ({
        day: day.day,
        stops: day.stops.map((stop) => [stop.name, stop.coord])
      })));
    }

    function applyCachedRoutes() {
      try {
        const cached = JSON.parse(localStorage.getItem(ROUTE_CACHE_KEY) || 'null');
        if (!cached || cached.signature !== routeSignature() || !Array.isArray(cached.days)) return false;
        if (cached.days.some((day) => day.errors && day.errors.length)) return false;
        clearRouteOverlays();
        cached.days.forEach((cachedDay) => {
          const day = resolvedDays.find((item) => item.day === cachedDay.day);
          if (!day) return;
          day.routePaths = cachedDay.routePaths || [];
          day.distance = cachedDay.distance || 0;
          day.time = cachedDay.time || 0;
          day.errors = cachedDay.errors || [];
          day.planned = true;
          drawDayRoute(day);
          updateDayMetric(day);
        });
        updateTotalMetrics();
        if (routeOverlays.length || markers.length) {
          map.setFitView([...routeOverlays, ...markers], false, mapPadding());
        }
        return true;
      } catch (error) {
        console.warn('读取路线缓存失败', error);
        return false;
      }
    }

    function saveRouteCache() {
      try {
        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify({
          signature: routeSignature(),
          days: resolvedDays.map((day) => ({
            day: day.day,
            routePaths: day.routePaths,
            distance: day.distance,
            time: day.time,
            errors: day.errors
          }))
        }));
      } catch (error) {
        console.warn('保存路线缓存失败', error);
      }
    }

    function drawMarkers() {
      const seen = new Set();
      resolvedDays.forEach((day) => {
        day.stops.forEach((stop) => {
          const key = stop.name + stop.point.join(',');
          if (seen.has(key)) return;
          seen.add(key);
          const marker = new AMapRef.Marker({
            position: stop.point,
            title: stop.name,
            content: `
              <div class="marker-wrap">
                <div class="map-marker" style="background:${day.color}">${stop.globalIndex}</div>
                <div class="map-label">${escapeHtml(stop.name)}</div>
              </div>
            `,
            offset: new AMapRef.Pixel(-15, -18),
            zIndex: 120
          });
          marker.on('click', () => activateDay(day.day));
          marker.setExtData({ day: day.day });
          map.add(marker);
          markers.push(marker);
        });
      });
    }

    function activateDay(dayName) {
      activeDay = dayName;
      let activeCard = null;
      document.querySelectorAll('.day-card').forEach((card) => {
        const isActive = card.dataset.day === dayName;
        card.classList.toggle('active', isActive);
        if (isActive) activeCard = card;
      });
      if (activeCard && isMobileLayout()) {
        activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
      routeOverlays.forEach((line) => {
        const isActive = line.getExtData().day === dayName;
        line.setOptions({ strokeOpacity: isActive ? 1 : 0.22, strokeWeight: isActive ? 9 : 5, zIndex: isActive ? 90 : 45 });
      });
      markers.forEach((marker) => {
        const isActive = marker.getExtData().day === dayName;
        marker.setzIndex(isActive ? 200 : 120);
      });
      const day = resolvedDays.find((item) => item.day === dayName);
      if (map && day) {
        const overlays = [
          ...routeOverlays.filter((line) => line.getExtData().day === dayName),
          ...markers.filter((marker) => marker.getExtData().day === dayName)
        ];
        if (overlays.length) map.setFitView(overlays, false, mapPadding(80));
      }
    }

    function activateFullRoute() {
      activeDay = 'ALL';
      document.querySelectorAll('.day-card').forEach((card) => {
        card.classList.remove('active');
      });
      if (!map || !routeOverlays.length) {
        setStatus('全程路线还在规划中，请稍后再试。');
        return;
      }
      routeOverlays.forEach((line) => {
        line.setOptions({ strokeOpacity: 0.92, strokeWeight: 7, zIndex: 60 });
      });
      markers.forEach((marker) => marker.setzIndex(120));
      map.setFitView([...routeOverlays, ...markers], false, mapPadding());
      setStatus('正在查看 D1-D9 全程路线。点击任一天卡片可聚焦当天。');
    }

    function renderDayCards() {
      daysEl.innerHTML = roadbook.map((day, dayIndex) => `
        <article class="day-card" data-day="${day.day}" role="button" tabindex="0" onclick="activateDay('${day.day}')" onkeydown="handleDayCardKey(event, '${day.day}')">
          <div class="day-head">
            <span class="badge" style="background:${COLORS[dayIndex]}">${day.day}</span>
            <span class="day-title"><b>${day.date} ${escapeHtml(day.title)}</b><span>${day.stops.length} 个节点</span></span>
            <span class="day-distance" id="metric-${day.day}">待规划</span>
          </div>
          <div class="day-body">
            <ol class="stops">
              ${day.stops.map((stop, i) => `<li><span class="stop-no" style="background:${COLORS[dayIndex]}">${globalStopIndex(dayIndex, i)}</span><span>${escapeHtml(stop.name)}</span></li>`).join('')}
            </ol>
            <div class="note">${escapeHtml(day.note)}</div>
          </div>
        </article>
      `).join('');
    }

    function handleDayCardKey(event, dayName) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        activateDay(dayName);
      }
    }

    function updateDayMetric(day) {
      const el = document.getElementById(`metric-${day.day}`);
      if (!el) return;
      const suffix = day.errors.length ? ' · 有失败段' : '';
      el.textContent = day.planned ? `${formatDistance(day.distance)} / ${formatTime(day.time)}${suffix}` : '预览中';
    }

    function updateTotalMetrics() {
      const totalDistance = resolvedDays.reduce((sum, day) => sum + day.distance, 0);
      const totalTime = resolvedDays.reduce((sum, day) => sum + day.time, 0);
      const allPlanned = resolvedDays.length && resolvedDays.every((day) => day.planned);
      document.getElementById('metricDistance').textContent = allPlanned ? formatDistance(totalDistance) : '预览中';
      document.getElementById('metricTime').textContent = allPlanned ? formatTime(totalTime) : '预览中';
    }

    function globalStopIndex(dayIndex, stopIndex) {
      let count = 0;
      for (let i = 0; i < dayIndex; i += 1) count += roadbook[i].stops.length;
      return count + stopIndex + 1;
    }

    function formatDistance(meters) {
      if (!meters) return '待规划';
      return `${(meters / 1000).toFixed(0)}km`;
    }

    function formatTime(seconds) {
      if (!seconds) return '待规划';
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.round((seconds % 3600) / 60);
      if (hours <= 0) return `${minutes}分钟`;
      return `${hours}小时${minutes}分`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showFallback(show) {
      fallbackEl.style.display = show ? 'block' : 'none';
    }

    function updateConfigVisibility() {
      if (keyInput.value && securityInput.value) {
        configGrid.classList.add('hidden');
        configGrid.setAttribute('aria-hidden', 'true');
        keyInput.tabIndex = -1;
        securityInput.tabIndex = -1;
        configText.textContent = '页面将使用本机保存或本地配置的高德 Web Key 加载地图，不在界面展示 Key 或安全密钥。';
      } else {
        revealConfigInputs();
      }
    }

    function revealConfigInputs() {
      configGrid.classList.remove('hidden');
      configGrid.setAttribute('aria-hidden', 'false');
      keyInput.tabIndex = 0;
      securityInput.tabIndex = 0;
      configPanel.classList.remove('ok');
      configText.textContent = '线上页面未包含真实 Key。请在本机填入高德 Web Key 和 securityJsCode；输入框为密码样式，配置只保存在当前浏览器。';
    }

    function isMobileLayout() {
      return window.matchMedia('(max-width: 940px)').matches;
    }

    function mapPadding(base = 70) {
      return [base, base, base, base];
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    window.activateDay = activateDay;
    window.activateFullRoute = activateFullRoute;
    window.handleDayCardKey = handleDayCardKey;
  </script>
</body>
</html>
